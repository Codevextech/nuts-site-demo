<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products – Admin – NutriNuts</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"/>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-nav-logo">🌰 Nutri<span>Nuts</span></div>
    <div style="padding:0 1.25rem .5rem;"><span style="font-size:.7rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;">Menu</span></div>
    <a href="index.html" class="admin-nav-item" id="nav-dashboard"><i class="ri-dashboard-3-line"></i> Dashboard</a>
    <a href="orders.html" class="admin-nav-item" id="nav-orders"><i class="ri-shopping-cart-2-line"></i> Orders</a>
    <a href="products.html" class="admin-nav-item active" id="nav-products"><i class="ri-store-2-line"></i> Products</a>
    <a href="categories.html" class="admin-nav-item" id="nav-categories"><i class="ri-function-line"></i> Categories</a>
    <a href="customers.html" class="admin-nav-item" id="nav-customers"><i class="ri-group-line"></i> Customers</a>
    <a href="coupons.html" class="admin-nav-item" id="nav-coupons"><i class="ri-ticket-2-line"></i> Coupons</a>
    <a href="reviews.html" class="admin-nav-item" id="nav-reviews"><i class="ri-star-smile-line"></i> Reviews</a>
    <a href="reports.html" class="admin-nav-item" id="nav-reports"><i class="ri-bar-chart-box-line"></i> Reports</a>
    <div style="margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:1rem;">
      <a href="settings.html" class="admin-nav-item" id="nav-settings"><i class="ri-settings-4-line"></i> Settings</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main" id="adminMain">
    <div class="admin-topbar">
      <button class="nav-icon-btn" id="sidebarToggle"><i class="ri-menu-2-line"></i></button>
      <div style="flex:1;"></div>
      <button class="theme-toggle" id="theme-toggle"><i class="ri-moon-line"></i></button>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--brown-light);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">A</div>
        <span style="font-size:.875rem;font-weight:600;" id="adminName">Admin</span>
      </div>
    </div>

    <div class="admin-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 style="font-size:1.6rem;margin-bottom:.25rem;">Products</h1>
          <p style="color:var(--text-light);font-size:.9rem;">Manage your inventory, pricing, and product details.</p>
        </div>
        <button class="btn btn-primary" id="addProductBtn"><i class="ri-add-line"></i> Add Product</button>
      </div>

      <!-- Filters & Search -->
      <div class="card" style="margin-bottom:1.5rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:center;padding:1rem 1.5rem;">
        <div class="form-group" style="margin:0;flex:1;min-width:260px;">
          <div style="position:relative;">
            <i class="ri-search-line" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>
            <input type="text" id="searchInput" class="form-control" placeholder="Search products..." style="padding-left:2.5rem;"/>
          </div>
        </div>
        <div class="form-group" style="margin:0;min-width:160px;">
          <select class="form-control" id="categoryFilter">
            <option value="">All Categories</option>
          </select>
        </div>
        <button class="btn btn-outline" id="refreshBtn"><i class="ri-refresh-line"></i> Refresh</button>
      </div>

      <!-- Products Table -->
      <div class="card table-wrapper">
        <table id="productsTable">
          <thead>
            <tr>
              <th width="60">Image</th>
              <th>Product Name</th>
              <th>Category</th>
              <th>Base Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="productsBody">
            <tr><td colspan="7" class="text-center" style="padding:2rem;"><div class="spinner" style="margin:0 auto 1rem;"></div>Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Product</h3>
        <button class="btn" style="padding:.25rem;background:none;font-size:1.2rem;" id="closeModalBtn"><i class="ri-close-line"></i></button>
      </div>
      <div class="modal-body">
        <form id="productForm">
          <input type="hidden" id="pId"/>
          
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Name <span style="color:#E53E3E">*</span></label>
              <input type="text" id="pName" class="form-control" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Category <span style="color:#E53E3E">*</span></label>
              <select id="pCategory" class="form-control" required></select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Short Description</label>
            <textarea id="pDesc" class="form-control" rows="2" required></textarea>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Base Price (250g) ₹ <span style="color:#E53E3E">*</span></label>
              <input type="number" id="pPrice" class="form-control" required min="0"/>
            </div>
            <div class="form-group">
              <label class="form-label">Total Stock (units) <span style="color:#E53E3E">*</span></label>
              <input type="number" id="pStock" class="form-control" required min="0"/>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Pricing Multipliers (Optional, e.g. 500g: 1.9, 1kg: 3.6)</label>
            <div style="display:flex;gap:.5rem;">
              <input type="number" id="pMult500" class="form-control" placeholder="500g ratio (e.g. 1.9)" step="0.01"/>
              <input type="number" id="pMult1000" class="form-control" placeholder="1kg ratio (e.g. 3.6)" step="0.01"/>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Image URL</label>
            <input type="url" id="pImage" class="form-control" placeholder="https://...jpg"/>
          </div>

          <div class="form-group">
            <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;">
              <input type="checkbox" id="pBestseller"/> Mark as Bestseller
            </label>
          </div>

          <div class="modal-footer" style="padding:1.5rem 0 0;border-top:1px solid var(--border);margin-top:1.5rem;display:flex;justify-content:flex-end;gap:1rem;">
            <button type="button" class="btn btn-secondary" id="cancelFormBtn">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveProductBtn">Save Product <i class="ri-save-line"></i></button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { db } from '../js/firebase-config.js';
    import { collection, getDocs, doc, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { initAdmin } from './js/admin.js';
    import { showToast } from '../js/auth.js';

    let allProducts = [];
    let categories = [];

    document.addEventListener('DOMContentLoaded', async () => {
      await initAdmin();
      await loadCategories();
      await loadProducts();
    });

    async function loadCategories() {
      try {
        const snap = await getDocs(query(collection(db,'categories'), orderBy('name')));
        categories = snap.docs.map(d=>({id:d.id,...d.data()}));
        const html = categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('categoryFilter').innerHTML = `<option value="">All Categories</option>${html}`;
        document.getElementById('pCategory').innerHTML = html;
      } catch(e) {
        console.error("Categories load failed:", e);
      }
    }

    async function loadProducts() {
      const tbody = document.getElementById('productsBody');
      try {
        const snap = await getDocs(query(collection(db,'products')));
        allProducts = snap.docs.map(d=>({id:d.id, ...d.data()}));
        renderTable();
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-red">Error loading products.</td></tr>';
      }
    }

    function renderTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      
      let filtered = allProducts;
      if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
      if (cat) filtered = filtered.filter(p => p.category === cat);

      const tbody = document.getElementById('productsBody');
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center">No products found.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(p => {
        const catName = categories.find(c=>c.id===p.category)?.name || 'Unknown';
        const status = p.stock > 10 ? '<span class="badge status-delivered">In Stock</span>' : 
                       (p.stock > 0 ? '<span class="badge badge-brown">Low Stock</span>' : '<span class="badge status-cancelled">Out of Stock</span>');
        const img = p.image || 'https://images.unsplash.com/photo-1508313527902-1571d929be67?w=80&q=60';
                       
        return `
        <tr>
          <td><img src="${img}" style="width:40px;height:40px;object-fit:cover;border-radius:var(--radius-sm);"/></td>
          <td style="font-weight:600;">${p.name}${p.bestseller?' <i class="ri-star-fill text-gold" style="font-size:.8rem;"></i>':''}</td>
          <td><span class="badge badge-brown" style="background:var(--cream-dark);">${catName}</span></td>
          <td style="font-weight:600;">₹${p.price}</td>
          <td>${p.stock}</td>
          <td>${status}</td>
          <td class="text-right">
            <button class="btn btn-outline btn-sm edit-btn" data-id="${p.id}" style="padding:.3rem .5rem;"><i class="ri-edit-line"></i></button>
            <button class="btn btn-sm del-btn" data-id="${p.id}" style="padding:.3rem .5rem;background:#FEE2E2;color:#DC2626;border:none;"><i class="ri-delete-bin-line"></i></button>
          </td>
        </tr>`;
      }).join('');

      // Bind actions
      document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', e => openModal(e.currentTarget.dataset.id)));
      document.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', e => deleteProduct(e.currentTarget.dataset.id)));
    }

    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('categoryFilter').addEventListener('change', renderTable);
    document.getElementById('refreshBtn').addEventListener('click', loadProducts);

    // Modal Logic
    const modal = document.getElementById('productModal');
    function closeModal() { modal.classList.remove('active'); document.getElementById('productForm').reset(); document.getElementById('pId').value=''; }
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('cancelFormBtn').addEventListener('click', closeModal);
    document.getElementById('addProductBtn').addEventListener('click', () => { document.getElementById('modalTitle').textContent='Add Product'; modal.classList.add('active'); });

    function openModal(id) {
      const p = allProducts.find(x=>x.id===id);
      if(!p) return;
      document.getElementById('modalTitle').textContent = 'Edit Product';
      document.getElementById('pId').value = p.id;
      document.getElementById('pName').value = p.name;
      document.getElementById('pCategory').value = p.category;
      document.getElementById('pDesc').value = p.description || '';
      document.getElementById('pPrice').value = p.price;
      document.getElementById('pStock').value = p.stock || 0;
      document.getElementById('pImage').value = p.image || '';
      document.getElementById('pBestseller').checked = !!p.bestseller;
      if (p.priceMultipliers) {
        document.getElementById('pMult500').value = p.priceMultipliers['500g'] || '';
        document.getElementById('pMult1000').value = p.priceMultipliers['1kg'] || '';
      } else {
        document.getElementById('pMult500').value = ''; document.getElementById('pMult1000').value = '';
      }
      modal.classList.add('active');
    }

    document.getElementById('productForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('saveProductBtn');
      btn.disabled = true; btn.textContent = 'Saving...';

      const id = document.getElementById('pId').value || `prod_${Date.now()}`;
      const data = {
        name: document.getElementById('pName').value,
        category: document.getElementById('pCategory').value,
        description: document.getElementById('pDesc').value,
        price: Number(document.getElementById('pPrice').value),
        stock: Number(document.getElementById('pStock').value),
        image: document.getElementById('pImage').value || null,
        bestseller: document.getElementById('pBestseller').checked,
        priceMultipliers: {
          '250g': 1,
          '500g': Number(document.getElementById('pMult500').value) || 1.9,
          '1kg': Number(document.getElementById('pMult1000').value) || 3.6
        },
        weights: ['250g','500g','1kg'],
        updatedAt: new Date()
      };

      try {
        await setDoc(doc(db,'products',id), data, { merge:true });
        showToast('Product saved successfully!', 'success');
        closeModal();
        loadProducts();
      } catch(err) {
        showToast('Error saving product: '+err.message, 'error');
      }
      btn.disabled = false; btn.innerHTML = 'Save Product <i class="ri-save-line"></i>';
    });

    async function deleteProduct(id) {
      if(!confirm('Are you sure you want to delete this product?')) return;
      try {
        await deleteDoc(doc(db,'products',id));
        showToast('Product deleted.', 'success');
        loadProducts();
      } catch(e) { showToast('Error deleting product.', 'error'); }
    }
  </script>
</body>
</html>
