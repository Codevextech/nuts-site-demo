<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Reports – Admin – NutriNuts</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"/>
  <link rel="stylesheet" href="../css/styles.css"/>
  <!-- Chart UI Fallback -->
  <style>
    .bar-chart { display:flex; align-items:flex-end; gap:.5rem; height:200px; padding-top:20px; border-bottom:1px solid var(--border); border-left:1px solid var(--border); position:relative; }
    .bar { flex:1; background:var(--green); border-radius:4px 4px 0 0; position:relative; min-height:4px; max-width:60px; margin:0 auto; transition:height .3s; }
    .bar:hover { background:var(--green-light); cursor:pointer; }
    .bar-val { position:absolute; top:-20px; left:50%; transform:translateX(-50%); font-size:.7rem; font-weight:600; color:var(--text-light); }
    .bar-label { position:absolute; bottom:-25px; left:50%; transform:translateX(-50%); font-size:.75rem; color:var(--text-med); white-space:nowrap; }
  </style>
</head>
<body class="admin-layout">

  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-nav-logo">🌰 Nutri<span>Nuts</span></div>
    <div style="padding:0 1.25rem .5rem;"><span style="font-size:.7rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;">Menu</span></div>
    <a href="index.html" class="admin-nav-item" id="nav-dashboard"><i class="ri-dashboard-3-line"></i> Dashboard</a>
    <a href="orders.html" class="admin-nav-item" id="nav-orders"><i class="ri-shopping-cart-2-line"></i> Orders</a>
    <a href="products.html" class="admin-nav-item" id="nav-products"><i class="ri-store-2-line"></i> Products</a>
    <a href="categories.html" class="admin-nav-item" id="nav-categories"><i class="ri-function-line"></i> Categories</a>
    <a href="customers.html" class="admin-nav-item" id="nav-customers"><i class="ri-group-line"></i> Customers</a>
    <a href="coupons.html" class="admin-nav-item" id="nav-coupons"><i class="ri-ticket-2-line"></i> Coupons</a>
    <a href="reviews.html" class="admin-nav-item" id="nav-reviews"><i class="ri-star-smile-line"></i> Reviews</a>
    <a href="reports.html" class="admin-nav-item active" id="nav-reports"><i class="ri-bar-chart-box-line"></i> Reports</a>
    <div style="margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:1rem;">
      <a href="settings.html" class="admin-nav-item" id="nav-settings"><i class="ri-settings-4-line"></i> Settings</a>
    </div>
  </aside>

  <main class="admin-main" id="adminMain">
    <div class="admin-topbar">
      <button class="nav-icon-btn" id="sidebarToggle"><i class="ri-menu-2-line"></i></button>
      <div style="flex:1;"></div>
      <button class="theme-toggle" id="theme-toggle"><i class="ri-moon-line"></i></button>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--brown-light);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">A</div>
        <span style="font-size:.875rem;font-weight:600;" id="adminName">Admin</span>
      </div>
    </div>

    <div class="admin-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 style="font-size:1.6rem;margin-bottom:.25rem;">Sales Reports</h1>
          <p style="color:var(--text-light);font-size:.9rem;">Overview of order volume and recent sales performance.</p>
        </div>
        <button class="btn btn-outline" id="printBtn"><i class="ri-printer-line"></i> Print</button>
      </div>

      <div class="card" style="padding:1.5rem;margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1.5rem;">Last 7 Days Revenue (₹)</h3>
        <div id="chartContainer" class="bar-chart" style="margin-bottom:1rem;">
          <!-- Generative pure CSS/JS chart -->
          <div style="margin:auto;color:var(--text-light);">Loading chart data…</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card table-wrapper">
          <h3 style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);">Payment Methods Split</h3>
          <table style="margin:0;">
            <tbody id="paymentSplitBody">
              <tr><td colspan="2"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="card table-wrapper">
          <h3 style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);">Top Selling Products (Unit wise)</h3>
          <table style="margin:0;">
            <tbody id="topProductsBody">
              <tr><td colspan="2"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { db } from '../js/firebase-config.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { initAdmin, formatCurrency } from './js/admin.js';

    document.addEventListener('DOMContentLoaded', async () => {
      await initAdmin();
      await loadReports();
      document.getElementById('printBtn').addEventListener('click', () => window.print());
    });

    async function loadReports() {
      try {
        const snap = await getDocs(collection(db,'orders'));
        const orders = snap.docs.map(d=>d.data());
        
        generateChart(orders);
        generatePaymentSplit(orders);
        generateTopProducts(orders);
      } catch(e) {
        document.getElementById('chartContainer').innerHTML = '<div class="text-red" style="margin:auto;">Error loading report data.</div>';
      }
    }

    function generateChart(orders) {
      // Last 7 days aggregation
      const data = {};
      const today = new Date();
      today.setHours(0,0,0,0);
      
      for(let i=6; i>=0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        data[d.toLocaleDateString('en-US',{weekday:'short'})] = 0;
      }

      orders.forEach(o => {
        if(!o.createdAt || o.status === 'Cancelled') return;
        const oDate = o.createdAt.toDate();
        if(oDate >= new Date(today.getTime() - 6*24*60*60*1000)) {
          const l = oDate.toLocaleDateString('en-US',{weekday:'short'});
          if(data[l] !== undefined) data[l] += (o.total || 0);
        }
      });

      const max = Math.max(...Object.values(data), 100);
      const html = Object.keys(data).map(k => {
        const h = (data[k]/max)*100;
        return `
          <div style="flex:1;position:relative;height:100%;display:flex;flex-direction:column;justify-content:flex-end;">
            <div class="bar" style="height:${h}%;"><span class="bar-val">${formatCurrency(data[k])}</span><span class="bar-label">${k}</span></div>
          </div>
        `;
      }).join('');
      
      document.getElementById('chartContainer').innerHTML = html;
    }

    function generatePaymentSplit(orders) {
      let codCount = 0, onlineCount = 0;
      orders.forEach(o => {
        if(o.paymentMethod === 'cod') codCount++; else onlineCount++;
      });
      const t = codCount+onlineCount || 1;
      
      document.getElementById('paymentSplitBody').innerHTML = `
        <tr><td>Cash on Delivery (COD)</td><td class="text-right"><strong>${codCount}</strong> (${((codCount/t)*100).toFixed(0)}%)</td></tr>
        <tr><td>Online (Razorpay)</td><td class="text-right"><strong>${onlineCount}</strong> (${((onlineCount/t)*100).toFixed(0)}%)</td></tr>
      `;
    }

    function generateTopProducts(orders) {
      const counts = {};
      orders.forEach(o => {
        if(o.status === 'Cancelled') return;
        (o.items||[]).forEach(i => {
           counts[i.name] = (counts[i.name]||0) + i.qty;
        });
      });
      
      const sorted = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,5);
      
      if(!sorted.length) {
        document.getElementById('topProductsBody').innerHTML = '<tr><td colspan="2" class="text-center">No product data.</td></tr>';
        return;
      }
      
      document.getElementById('topProductsBody').innerHTML = sorted.map((k,i) => `
        <tr><td>${i+1}. ${k}</td><td class="text-right"><strong>${counts[k]}</strong> sold</td></tr>
      `).join('');
    }
  </script>
</body>
</html>
