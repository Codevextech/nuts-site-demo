<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reviews – Admin – NutriNuts</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"/>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    .review-stars { color:var(--gold); }
    .review-text { font-size:.85rem; color:var(--text-med); margin-top:.25rem; max-width:400px; display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
</head>
<body class="admin-layout">

  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-nav-logo">🌰 Nutri<span>Nuts</span></div>
    <div style="padding:0 1.25rem .5rem;"><span style="font-size:.7rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;">Menu</span></div>
    <a href="index.html" class="admin-nav-item" id="nav-dashboard"><i class="ri-dashboard-3-line"></i> Dashboard</a>
    <a href="orders.html" class="admin-nav-item" id="nav-orders"><i class="ri-shopping-cart-2-line"></i> Orders</a>
    <a href="products.html" class="admin-nav-item" id="nav-products"><i class="ri-store-2-line"></i> Products</a>
    <a href="categories.html" class="admin-nav-item" id="nav-categories"><i class="ri-function-line"></i> Categories</a>
    <a href="customers.html" class="admin-nav-item" id="nav-customers"><i class="ri-group-line"></i> Customers</a>
    <a href="coupons.html" class="admin-nav-item" id="nav-coupons"><i class="ri-ticket-2-line"></i> Coupons</a>
    <a href="reviews.html" class="admin-nav-item active" id="nav-reviews"><i class="ri-star-smile-line"></i> Reviews</a>
    <a href="reports.html" class="admin-nav-item" id="nav-reports"><i class="ri-bar-chart-box-line"></i> Reports</a>
    <div style="margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:1rem;">
      <a href="settings.html" class="admin-nav-item" id="nav-settings"><i class="ri-settings-4-line"></i> Settings</a>
    </div>
  </aside>

  <main class="admin-main" id="adminMain">
    <div class="admin-topbar">
      <button class="nav-icon-btn" id="sidebarToggle"><i class="ri-menu-2-line"></i></button>
      <div style="flex:1;"></div>
      <button class="theme-toggle" id="theme-toggle"><i class="ri-moon-line"></i></button>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--brown-light);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">A</div>
        <span style="font-size:.875rem;font-weight:600;" id="adminName">Admin</span>
      </div>
    </div>

    <div class="admin-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <div>
          <h1 style="font-size:1.6rem;margin-bottom:.25rem;">Product Reviews</h1>
          <p style="color:var(--text-light);font-size:.9rem;">Manage, approve, or delete customer reviews.</p>
        </div>
      </div>

      <div class="card table-wrapper">
        <table id="reviewsTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Customer</th>
              <th>Product ID</th>
              <th>Rating & Review</th>
              <th>Status</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="reviewsBody">
            <tr><td colspan="6" class="text-center" style="padding:2rem;"><div class="spinner" style="margin:0 auto 1rem;"></div>Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  
  <div id="toast-container"></div>

  <script type="module">
    import { db } from '../js/firebase-config.js';
    import { collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { initAdmin } from './js/admin.js';
    import { showToast } from '../js/auth.js';

    let allReviews = [];

    document.addEventListener('DOMContentLoaded', async () => {
      await initAdmin();
      await loadReviews();
    });

    async function loadReviews() {
      const tbody = document.getElementById('reviewsBody');
      try {
        const snap = await getDocs(query(collection(db,'reviews'), orderBy('createdAt','desc')));
        allReviews = snap.docs.map(d=>({id:d.id, ...d.data()}));
        renderTable();
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-red">Error loading reviews.</td></tr>';
      }
    }

    function renderTable() {
      const tbody = document.getElementById('reviewsBody');
      if (!allReviews.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center">No reviews submitted yet.</td></tr>';
        return;
      }

      tbody.innerHTML = allReviews.map(r => {
        const date = r.createdAt?.toDate?.()?.toLocaleDateString('en-IN') || '—';
        const stars = Array(5).fill(0).map((_,i) => `<i class="${i<r.rating?'ri-star-fill':'ri-star-line'}"></i>`).join('');
        const statusBadge = r.approved 
          ? '<span class="badge status-delivered">Approved</span>' 
          : '<span class="badge badge-brown">Pending</span>';

        return `
        <tr>
          <td style="font-size:.85rem;">${date}</td>
          <td>
            <p style="font-weight:600;font-size:.9rem;">${r.userName||'Anonymous'}</p>
          </td>
          <td style="font-family:monospace;font-size:.8rem;color:var(--text-light);">${r.productId}</td>
          <td>
            <div class="review-stars">${stars}</div>
            <p class="review-text" title="${r.text||''}">${r.text||'<i>No text provided</i>'}</p>
          </td>
          <td id="status-${r.id}">${statusBadge}</td>
          <td class="text-right" style="white-space:nowrap;">
            ${!r.approved ? `<button class="btn btn-outline btn-sm app-btn" data-id="${r.id}" style="padding:.3rem .5rem;"><i class="ri-check-line"></i></button>` : `<button class="btn btn-outline btn-sm unapp-btn" data-id="${r.id}" style="padding:.3rem .5rem;"><i class="ri-close-line"></i></button>`}
            <button class="btn btn-sm del-btn" data-id="${r.id}" style="padding:.3rem .5rem;background:#FEE2E2;color:#DC2626;border:none;"><i class="ri-delete-bin-line"></i></button>
          </td>
        </tr>`;
      }).join('');

      document.querySelectorAll('.app-btn').forEach(btn => btn.addEventListener('click', e => toggleApproval(e.currentTarget.dataset.id, true)));
      document.querySelectorAll('.unapp-btn').forEach(btn => btn.addEventListener('click', e => toggleApproval(e.currentTarget.dataset.id, false)));
      document.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', e => deleteReview(e.currentTarget.dataset.id)));
    }

    async function toggleApproval(id, approved) {
      try {
        await updateDoc(doc(db,'reviews',id), { approved });
        showToast(approved ? 'Review approved.' : 'Review marked pending.');
        const rev = allReviews.find(r=>r.id===id); if(rev) rev.approved = approved;
        renderTable();
      } catch(e) { showToast('Error updating status.','error'); }
    }

    async function deleteReview(id) {
      if(!confirm('Delete this review permanently?')) return;
      try {
        await deleteDoc(doc(db,'reviews',id));
        showToast('Review deleted.','success');
        loadReviews();
      } catch(e) { showToast('Error deleting.','error'); }
    }
  </script>
</body>
</html>
