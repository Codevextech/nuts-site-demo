<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout – NutriNuts</title>
  <meta name="description" content="Complete your order with secure payment options – Cash on Delivery or Razorpay UPI."/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    .checkout-grid { display:grid; gap:1.5rem; grid-template-columns:1fr; }
    @media(min-width:1024px){ .checkout-grid { grid-template-columns:1fr 380px; } }
    .step-header { display:flex; align-items:center; gap:.75rem; margin-bottom:1.25rem; }
    .step-num { width:28px; height:28px; border-radius:50%; background:var(--brown); color:#fff; font-size:.75rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo">🌰 Nutri<span>Nuts</span></a>
      <div class="nav-actions">
        <button class="theme-toggle" id="theme-toggle"><i class="ri-moon-line"></i></button>
        <a href="cart.html" class="nav-icon-btn" aria-label="Back to Cart"><i class="ri-shopping-cart-2-line"></i></a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <!-- Breadcrumb -->
      <div class="breadcrumb" style="margin-bottom:1.5rem;">
        <a href="cart.html">Cart</a><span class="breadcrumb-sep">/</span><span class="current">Checkout</span>
      </div>

      <div class="checkout-grid">
        <!-- Left: Form -->
        <div style="display:flex;flex-direction:column;gap:1.5rem;">
          <!-- Delivery Details -->
          <div class="card" style="padding:1.5rem;">
            <div class="step-header"><span class="step-num">1</span><h2 style="font-size:1.1rem;">Delivery Details</h2></div>
            <form id="deliveryForm">
              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">Full Name <span style="color:#E53E3E">*</span></label>
                  <input id="dName" type="text" class="form-control" placeholder="Priya Sharma" required/>
                </div>
                <div class="form-group">
                  <label class="form-label">Phone Number <span style="color:#E53E3E">*</span></label>
                  <input id="dPhone" type="tel" class="form-control" placeholder="9876543210" required pattern="[0-9]{10}"/>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Address <span style="color:#E53E3E">*</span></label>
                <textarea id="dAddress" class="form-control" rows="2" placeholder="House No., Street, Area" required></textarea>
              </div>
              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">City <span style="color:#E53E3E">*</span></label>
                  <input id="dCity" type="text" class="form-control" placeholder="Mumbai" required/>
                </div>
                <div class="form-group">
                  <label class="form-label">Pincode <span style="color:#E53E3E">*</span></label>
                  <input id="dPincode" type="text" class="form-control" placeholder="400001" required pattern="[0-9]{6}"/>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">State</label>
                <select id="dState" class="form-control">
                  <option value="">Select State</option>
                  <option>Maharashtra</option><option>Delhi</option><option>Karnataka</option>
                  <option>Tamil Nadu</option><option>Gujarat</option><option>Telangana</option>
                  <option>Uttar Pradesh</option><option>Rajasthan</option><option>West Bengal</option>
                  <option>Kerala</option><option>Punjab</option><option>Madhya Pradesh</option>
                </select>
              </div>
            </form>
          </div>

          <!-- Payment -->
          <div class="card" style="padding:1.5rem;">
            <div class="step-header"><span class="step-num">2</span><h2 style="font-size:1.1rem;">Payment Method</h2></div>
            <div style="display:flex;flex-direction:column;gap:.85rem;" id="paymentOptions">
              <label class="payment-option selected" id="codOption">
                <input type="radio" name="payment" value="cod" checked/>
                <div>
                  <p style="font-weight:600;font-size:.9rem;">💵 Cash on Delivery</p>
                  <p style="font-size:.78rem;color:var(--text-light);">Pay when your order arrives. Extra ₹20 COD charges may apply.</p>
                </div>
              </label>
              <label class="payment-option" id="onlineOption">
                <input type="radio" name="payment" value="online"/>
                <div>
                  <p style="font-weight:600;font-size:.9rem;">⚡ Online Payment (Razorpay)</p>
                  <p style="font-size:.78rem;color:var(--text-light);">UPI, Cards, Net Banking, Wallets – fastest & secure.</p>
                </div>
              </label>
            </div>
          </div>
        </div>

        <!-- Right: Summary -->
        <div>
          <div class="order-summary" style="position:sticky;top:80px;">
            <h3 style="margin-bottom:1rem;font-size:1.05rem;">Order Summary</h3>
            <div id="checkoutItems" style="margin-bottom:1rem;max-height:240px;overflow-y:auto;"></div>
            <hr class="divider"/>
            <div class="summary-row"><span>Subtotal</span><span id="coSubtotal">₹0</span></div>
            <div class="summary-row" id="coDiscountRow" style="display:none;color:var(--green);"><span>Discount</span><span id="coDiscount">-₹0</span></div>
            <div class="summary-row"><span>Delivery</span><span id="coDelivery">₹49</span></div>
            <div class="summary-row total"><span>Total Payable</span><span id="coTotal">₹0</span></div>
            <button class="btn btn-primary btn-full btn-lg" id="placeOrderBtn" style="margin-top:1.25rem;">
              Place Order <i class="ri-arrow-right-line"></i>
            </button>
            <div style="text-align:center;margin-top:.75rem;">
              <span style="font-size:.75rem;color:var(--text-light);"><i class="ri-shield-check-line" style="color:var(--green);"></i> 100% Secure Payment</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="toast-container"></div>

  <script type="module">
    import { initTheme, showToast } from './js/auth.js';
    import { getCart, getCartSubtotal, clearCart } from './js/cart.js';
    import { db, auth, RAZORPAY_KEY } from './js/firebase-config.js';
    import { collection, addDoc, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    initTheme();

    const cart = getCart();
    const meta = JSON.parse(localStorage.getItem('ns_order_meta') || '{}');
    const subtotal  = meta.subtotal  || getCartSubtotal();
    const discount  = meta.discount  || 0;
    const delivery  = meta.delivery  ?? (subtotal >= 499 ? 0 : 49);
    const total     = meta.total     || (subtotal - discount + delivery);

    // Render items
    document.getElementById('checkoutItems').innerHTML = cart.map(i=>`
      <div style="display:flex;gap:.75rem;align-items:center;margin-bottom:.75rem;">
        <img src="${i.image||'https://images.unsplash.com/photo-1508313527902-1571d929be67?w=80&q=60'}" style="width:48px;height:48px;border-radius:var(--radius-sm);object-fit:cover;" alt="${i.name}"/>
        <div style="flex:1;"><p style="font-size:.8rem;font-weight:600;">${i.name}</p><p style="font-size:.72rem;color:var(--text-light);">${i.weight} × ${i.qty}</p></div>
        <span style="font-size:.85rem;font-weight:700;color:var(--brown);">₹${(i.price*i.qty).toFixed(0)}</span>
      </div>`).join('');

    document.getElementById('coSubtotal').textContent = `₹${subtotal}`;
    document.getElementById('coDelivery').textContent = delivery === 0 ? 'FREE' : `₹${delivery}`;
    document.getElementById('coTotal').textContent    = `₹${total}`;
    if (discount > 0) {
      document.getElementById('coDiscountRow').style.display = 'flex';
      document.getElementById('coDiscount').textContent = `-₹${discount}`;
    }

    // Payment option UI
    document.querySelectorAll('input[name="payment"]').forEach(r => {
      r.addEventListener('change', () => {
        document.getElementById('codOption').classList.toggle('selected', r.value==='cod');
        document.getElementById('onlineOption').classList.toggle('selected', r.value==='online');
      });
    });

    function getSelectedPayment() {
      return document.querySelector('input[name="payment"]:checked')?.value || 'cod';
    }

    function getDeliveryData() {
      return {
        name:    document.getElementById('dName').value.trim(),
        phone:   document.getElementById('dPhone').value.trim(),
        address: document.getElementById('dAddress').value.trim(),
        city:    document.getElementById('dCity').value.trim(),
        state:   document.getElementById('dState').value,
        pincode: document.getElementById('dPincode').value.trim(),
      };
    }

    function validate() {
      const d = getDeliveryData();
      if (!d.name || !d.phone || !d.address || !d.city || !d.pincode) {
        showToast('Please fill all required delivery fields.','error'); return false;
      }
      if (!/^[0-9]{10}$/.test(d.phone)) { showToast('Enter a valid 10-digit phone number.','error'); return false; }
      if (!/^[0-9]{6}$/.test(d.pincode)) { showToast('Enter a valid 6-digit pincode.','error'); return false; }
      return true;
    }

    async function saveOrderToFirestore(paymentMethod, paymentId = '') {
      const user = auth.currentUser;
      const delivery = getDeliveryData();
      const orderData = {
        userId: user?.uid || 'guest',
        items: cart,
        delivery,
        paymentMethod,
        paymentId,
        couponCode: meta.coupon || '',
        discount,
        deliveryCharge: meta.delivery ?? 49,
        subtotal,
        total,
        status: 'Pending',
        createdAt: serverTimestamp()
      };
      const ref = await addDoc(collection(db, 'orders'), orderData);
      // Update stock
      for (const item of cart) {
        try {
          await updateDoc(doc(db,'products',item.productId), { stock: increment(-item.qty) });
        } catch(e) { /* ignore if product not in firestore */ }
      }
      return ref.id;
    }

    document.getElementById('placeOrderBtn').addEventListener('click', async () => {
      if (!cart.length) { showToast('Your cart is empty!','error'); return; }
      if (!validate()) return;

      const payMethod = getSelectedPayment();
      const btn = document.getElementById('placeOrderBtn');
      btn.disabled = true; btn.textContent = 'Processing…';

      if (payMethod === 'cod') {
        try {
          const orderId = await saveOrderToFirestore('cod');
          clearCart();
          window.location.href = `order-confirmation.html?id=${orderId}&method=cod`;
        } catch(e) {
          // Offline / no firebase - still redirect with demo ID
          clearCart();
          window.location.href = `order-confirmation.html?id=DEMO-${Date.now()}&method=cod`;
        }
      } else {
        // Razorpay
        const options = {
          key: RAZORPAY_KEY || 'rzp_test_YourKeyHere',
          amount: total * 100,
          currency: 'INR',
          name: 'NutriNuts',
          description: `Order for ${cart.length} item(s)`,
          image: '',
          handler: async function(response) {
            try {
              const orderId = await saveOrderToFirestore('online', response.razorpay_payment_id);
              clearCart();
              window.location.href = `order-confirmation.html?id=${orderId}&method=online&pay=${response.razorpay_payment_id}`;
            } catch(e) {
              clearCart();
              window.location.href = `order-confirmation.html?id=DEMO-${Date.now()}&method=online&pay=${response.razorpay_payment_id}`;
            }
          },
          prefill: {
            name:  document.getElementById('dName').value,
            contact: document.getElementById('dPhone').value,
          },
          theme: { color: '#6B3F1F' },
          modal: { ondismiss: () => { btn.disabled=false; btn.innerHTML='Place Order <i class="ri-arrow-right-line"></i>'; } }
        };
        const rzp = new Razorpay(options);
        rzp.on('payment.failed', () => { showToast('Payment failed. Please try again.','error'); btn.disabled=false; btn.innerHTML='Place Order <i class="ri-arrow-right-line"></i>'; });
        rzp.open();
        return;
      }
      btn.disabled=false; btn.innerHTML='Place Order <i class="ri-arrow-right-line"></i>';
    });
  </script>
</body>
</html>
