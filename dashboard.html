<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard – NutriNuts</title>
  <meta name="description" content="Manage your profile, orders, addresses and wishlist on NutriNuts."/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .dashboard-layout { display:grid; gap:1.5rem; grid-template-columns:1fr; }
    @media(min-width:1024px) { .dashboard-layout { grid-template-columns:240px 1fr; } }
    .dash-sidebar { background:var(--white); border-radius:var(--radius-md); border:1px solid var(--border); height:fit-content; overflow:hidden; position:sticky; top:80px; }
    .dash-user { padding:1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:1rem; }
    .dash-avatar { width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--brown),var(--brown-light)); color:#fff; font-size:1.3rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .dash-name { font-weight:700; font-size:.95rem; }
    .dash-email { font-size:.75rem; color:var(--text-light); }
    .dash-nav-item { display:flex; align-items:center; gap:.75rem; padding:.8rem 1.25rem; font-size:.875rem; font-weight:500; color:var(--text-med); cursor:pointer; transition:var(--transition); border-left:3px solid transparent; }
    .dash-nav-item:hover { background:var(--brown-50); color:var(--brown); }
    .dash-nav-item.active { background:var(--brown-50); color:var(--brown); border-left-color:var(--brown); }
    .dash-panel { display:none; }
    .dash-panel.active { display:block; }
    .order-card { background:var(--white); border-radius:var(--radius-md); border:1px solid var(--border); padding:1.25rem; display:flex; flex-wrap:wrap; gap:1rem; align-items:center; }
    .order-item-thumb { width:44px; height:44px; border-radius:var(--radius-sm); object-fit:cover; background:var(--cream-dark); }
    .address-card { background:var(--white); border-radius:var(--radius-md); border:1px solid var(--border); padding:1.25rem; position:relative; }
    .wish-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:.85rem; }
    .wish-item { text-align:center; background:var(--white); border-radius:var(--radius-md); border:1px solid var(--border); padding:.75rem; cursor:pointer; transition:var(--transition); }
    .wish-item:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .wish-item img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:var(--radius-sm); margin-bottom:.5rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo">🌰 Nutri<span>Nuts</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" id="theme-toggle"><i class="ri-moon-line"></i></button>
        <a href="cart.html" class="nav-icon-btn"><i class="ri-shopping-cart-2-line"></i><span class="cart-badge" id="cart-badge" style="display:none">0</span></a>
        <button class="btn btn-outline btn-sm" id="logoutBtn">Logout <i class="ri-logout-circle-line"></i></button>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="dash-sidebar">
          <div class="dash-user">
            <div class="dash-avatar" id="dashAvatar">?</div>
            <div><p class="dash-name" id="dashName">Loading…</p><p class="dash-email" id="dashEmail"></p></div>
          </div>
          <div class="dash-nav-item active" data-panel="profile"><i class="ri-user-3-line"></i> My Profile</div>
          <div class="dash-nav-item" data-panel="orders"><i class="ri-file-list-3-line"></i> My Orders</div>
          <div class="dash-nav-item" data-panel="addresses"><i class="ri-map-pin-2-line"></i> Saved Addresses</div>
          <div class="dash-nav-item" data-panel="wishlist"><i class="ri-heart-line"></i> Wishlist</div>
          <div class="dash-nav-item" style="color:#E53E3E;" id="logoutNavBtn"><i class="ri-logout-circle-line"></i> Logout</div>
        </aside>

        <!-- Panels -->
        <div>
          <!-- Profile Panel -->
          <div class="dash-panel active card" style="padding:1.5rem;" id="panel-profile">
            <h2 style="font-size:1.15rem;margin-bottom:1.5rem;">My Profile</h2>
            <form id="profileForm">
              <div class="grid-2">
                <div class="form-group"><label class="form-label">Full Name</label><input id="pName" type="text" class="form-control" placeholder="Your name"/></div>
                <div class="form-group"><label class="form-label">Phone</label><input id="pPhone" type="tel" class="form-control" placeholder="9876543210"/></div>
              </div>
              <div class="form-group"><label class="form-label">Email (cannot change)</label><input id="pEmail" type="email" class="form-control" disabled style="opacity:.6;"/></div>
              <button type="submit" class="btn btn-primary">Save Changes <i class="ri-save-2-line"></i></button>
            </form>
          </div>

          <!-- Orders Panel -->
          <div class="dash-panel" id="panel-orders">
            <h2 style="font-size:1.15rem;margin-bottom:1.5rem;">My Orders</h2>
            <div id="ordersContainer"><div class="loading-overlay"><div class="spinner"></div><p>Loading orders…</p></div></div>
          </div>

          <!-- Addresses Panel -->
          <div class="dash-panel" id="panel-addresses">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
              <h2 style="font-size:1.15rem;">Saved Addresses</h2>
              <button class="btn btn-outline btn-sm" id="addAddressBtn"><i class="ri-add-line"></i> Add New</button>
            </div>
            <div id="addressesContainer"><p style="color:var(--text-light);">No saved addresses yet.</p></div>
            <div id="addressForm" style="display:none;margin-top:1rem;" class="card" style="padding:1.25rem;">
              <div style="padding:1.25rem;">
                <h4 style="margin-bottom:1rem;">Add New Address</h4>
                <div class="grid-2">
                  <div class="form-group"><label class="form-label">Address Label</label><input id="aLabel" type="text" class="form-control" placeholder="Home / Office"/></div>
                  <div class="form-group"><label class="form-label">Phone</label><input id="aPhone" type="tel" class="form-control" placeholder="9876543210"/></div>
                </div>
                <div class="form-group"><label class="form-label">Full Address</label><textarea id="aAddress" class="form-control" rows="2"></textarea></div>
                <div class="grid-2">
                  <div class="form-group"><label class="form-label">City</label><input id="aCity" type="text" class="form-control"/></div>
                  <div class="form-group"><label class="form-label">Pincode</label><input id="aPincode" type="text" class="form-control" maxlength="6"/></div>
                </div>
                <div style="display:flex;gap:.75rem;">
                  <button class="btn btn-primary btn-sm" id="saveAddressBtn">Save Address</button>
                  <button class="btn btn-secondary btn-sm" id="cancelAddressBtn">Cancel</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Wishlist Panel -->
          <div class="dash-panel" id="panel-wishlist">
            <h2 style="font-size:1.15rem;margin-bottom:1.5rem;">My Wishlist</h2>
            <div class="wish-grid" id="wishlistContainer"><p style="color:var(--text-light);">Your wishlist is empty.</p></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item"><i class="ri-home-5-line"></i><span>Home</span></a>
    <a href="products.html" class="bottom-nav-item"><i class="ri-store-2-line"></i><span>Shop</span></a>
    <a href="cart.html" class="bottom-nav-item"><i class="ri-shopping-cart-2-line"></i><span class="bottom-nav-badge" data-cart style="display:none">0</span><span>Cart</span></a>
    <a href="dashboard.html" class="bottom-nav-item active"><i class="ri-user-fill"></i><span>Account</span></a>
  </nav>
  <div id="toast-container"></div>

  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { requireAuth, getUserProfile, logout, initTheme, showToast } from './js/auth.js';
    import { getWishlist, updateCartBadge } from './js/cart.js';
    import { collection, getDocs, query, where, orderBy, doc, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    initTheme(); updateCartBadge();

    let currentUser = null, currentProfile = null;

    // Auth guard
    const user = await requireAuth('auth.html');
    currentUser = user;
    currentProfile = await getUserProfile(user.uid);

    // Populate profile
    document.getElementById('dashAvatar').textContent = (currentProfile?.name || user.email)?.[0]?.toUpperCase() || '?';
    document.getElementById('dashName').textContent = currentProfile?.name || 'Customer';
    document.getElementById('dashEmail').textContent = user.email;
    document.getElementById('pName').value = currentProfile?.name || '';
    document.getElementById('pPhone').value = currentProfile?.phone || '';
    document.getElementById('pEmail').value = user.email;

    // Load wishlist from localStorage
    function loadWishlist() {
      const ids = getWishlist();
      const cont = document.getElementById('wishlistContainer');
      if (!ids.length) { cont.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="ri-heart-line"></i><h3>Wishlist empty</h3><p>Tap ❤️ on products to save them here.</p></div>'; return; }
      cont.innerHTML = `<p style="font-size:.85rem;color:var(--text-light);grid-column:1/-1;">${ids.length} saved items. Click any to view details.</p>` +
        ids.map(id=>`<div class="wish-item" onclick="window.location.href='product-detail.html?id=${id}'">
          <img src="https://images.unsplash.com/photo-1508313527902-1571d929be67?w=200&q=60" alt="Product"/>
          <p style="font-size:.75rem;font-weight:600;">Product</p>
        </div>`).join('');
    }
    loadWishlist();

    // Load orders
    async function loadOrders() {
      const cont = document.getElementById('ordersContainer');
      try {
        const snap = await getDocs(query(collection(db,'orders'), where('userId','==',user.uid), orderBy('createdAt','desc')));
        const orders = snap.docs.map(d=>({id:d.id,...d.data()}));
        if (!orders.length) {
          cont.innerHTML = '<div class="empty-state"><i class="ri-file-list-3-line"></i><h3>No orders yet</h3><p>Start shopping to see your orders here.</p><a href="products.html" class="btn btn-primary" style="margin-top:.5rem;">Shop Now</a></div>';
          return;
        }
        cont.innerHTML = orders.map(o => {
          const date = o.createdAt?.toDate?.().toLocaleDateString('en-IN') || '—';
          const steps = ['Pending','Packed','Shipped','Delivered'];
          const stepIdx = steps.indexOf(o.status);
          return `<div class="order-card" style="margin-bottom:1rem;">
            <div style="flex:1;min-width:200px;">
              <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;">
                <p style="font-weight:700;font-size:.875rem;">Order #${o.id.slice(-8).toUpperCase()}</p>
                <span class="badge status-${o.status?.toLowerCase()}">${o.status||'Pending'}</span>
              </div>
              <p style="font-size:.78rem;color:var(--text-light);margin:.35rem 0;">${date} · ${o.items?.length||0} item(s) · ₹${o.total||0}</p>
              <p style="font-size:.78rem;color:var(--text-light);">Payment: ${o.paymentMethod==='cod'?'Cash on Delivery':'Online'}</p>
            </div>
            <div class="order-timeline" style="min-width:240px;margin-top:.75rem;">
              ${steps.map((s,i)=>`<div class="timeline-step ${i<stepIdx?'done':i===stepIdx?'active':''}">
                <div class="timeline-dot">${i<stepIdx?'<i class="ri-check-line" style="font-size:.65rem;"></i>':''}</div>
                <span class="timeline-label">${s}</span>
              </div>`).join('')}
            </div>
          </div>`;
        }).join('');
      } catch(err) {
        cont.innerHTML = '<div class="empty-state"><i class="ri-wifi-off-line"></i><h3>Could not load orders</h3><p>Configure Firebase to see order history.</p></div>';
      }
    }

    // Load addresses
    function loadAddresses() {
      const cont = document.getElementById('addressesContainer');
      const addresses = currentProfile?.addresses || [];
      if (!addresses.length) { cont.innerHTML = '<p style="color:var(--text-light);">No saved addresses yet.</p>'; return; }
      cont.innerHTML = addresses.map((a,i)=>`
        <div class="address-card" style="margin-bottom:.85rem;">
          <span class="badge badge-brown" style="margin-bottom:.5rem;">${a.label||'Address '+(i+1)}</span>
          <p style="font-size:.875rem;margin-top:.35rem;">${a.address}, ${a.city} – ${a.pincode}</p>
          <p style="font-size:.8rem;color:var(--text-light);">📞 ${a.phone||''}</p>
        </div>`).join('');
    }
    loadAddresses();

    // Save address
    document.getElementById('addAddressBtn').addEventListener('click',()=>{ document.getElementById('addressForm').style.display='block'; });
    document.getElementById('cancelAddressBtn').addEventListener('click',()=>{ document.getElementById('addressForm').style.display='none'; });
    document.getElementById('saveAddressBtn').addEventListener('click', async ()=>{
      const addr = { label:document.getElementById('aLabel').value, phone:document.getElementById('aPhone').value, address:document.getElementById('aAddress').value, city:document.getElementById('aCity').value, pincode:document.getElementById('aPincode').value };
      try {
        await updateDoc(doc(db,'users',user.uid),{ addresses: arrayUnion(addr) });
        currentProfile.addresses = [...(currentProfile.addresses||[]), addr];
        loadAddresses();
        document.getElementById('addressForm').style.display='none';
        showToast('Address saved!');
      } catch(e) { showToast('Error saving address.','error'); }
    });

    // Profile save
    document.getElementById('profileForm').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        await updateDoc(doc(db,'users',user.uid),{ name:document.getElementById('pName').value, phone:document.getElementById('pPhone').value });
        showToast('Profile updated!');
        document.getElementById('dashName').textContent = document.getElementById('pName').value;
        document.getElementById('dashAvatar').textContent = document.getElementById('pName').value?.[0]?.toUpperCase()||'?';
      } catch(e) { showToast('Error updating profile.','error'); }
    });

    // Panel switching
    document.querySelectorAll('.dash-nav-item[data-panel]').forEach(item=>{
      item.addEventListener('click',()=>{
        document.querySelectorAll('.dash-nav-item').forEach(n=>n.classList.remove('active'));
        document.querySelectorAll('.dash-panel').forEach(p=>p.classList.remove('active'));
        item.classList.add('active');
        document.getElementById(`panel-${item.dataset.panel}`).classList.add('active');
        if(item.dataset.panel==='orders') loadOrders();
      });
    });

    // Handle hash
    if(location.hash === '#orders') {
      document.querySelector('[data-panel="orders"]').click();
    }

    // Logout
    document.getElementById('logoutBtn')?.addEventListener('click', ()=>logout());
    document.getElementById('logoutNavBtn')?.addEventListener('click', ()=>logout());
  </script>
</body>
</html>
